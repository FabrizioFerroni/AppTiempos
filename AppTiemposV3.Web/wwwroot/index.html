<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeTracker Pro</title>
    <base href="/" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <script>
        (function () {
            const isDark = localStorage.getItem('color-theme') === 'dark' ||
                (!('color-theme' in localStorage) &&
                    window.matchMedia('(prefers-color-scheme: dark)').matches);

            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
        
        (async function obtenerDatos() {
            try {
                const apiUrl = "https://localhost:7260/api/generics/colors";
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Error en la petición: ' + response.status);

                const data = await response.json();
                const accent = localStorage.getItem('color-accent') || 'Azul';

                const colorSeleccionado = data.find(c => c.name?.trim().toLowerCase() === accent.trim().toLowerCase());

                const elementos = [
                    document.getElementById('logo'),
                    document.getElementById('progressBar'),
                    document.getElementById('dot-1'),
                    document.getElementById('dot-2'),
                    document.getElementById('dot-3')
                ];

                const clasePorDefecto = "bg-gradient-to-br from-blue-500 to-indigo-500";

                const clases = (colorSeleccionado?.gradient || clasePorDefecto).split(' ');

                elementos.forEach(el => {
                    if (el) el.classList.add(...clases);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        })();

        const currentTheme2 = localStorage.getItem('color-theme') || 'system';
        applyTheme(currentTheme2);

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                // system
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
        }

    </script>
    <script src="js/clipboardToUrl.js"></script>
    <script src="js/selectHelper.js"></script>
    <script src="js/modalHelpers.js"></script>
    <script src="js/site.js"></script>
    <script src="js/utils.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/output.css" />
    <link rel="stylesheet" href="css/app.min.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="AppTiemposV3.web.styles.css" rel="stylesheet" />
    <style>
        @keyframes loading-bar {
            0% {
                width: 0%;
                margin-left: 0%;
            }
            50% {
                width: 75%;
                margin-left: 12.5%;
            }
            100% {
                width: 0%;
                margin-left: 100%;
            }
        }
        
        #blazor-error-ui {
            display: none;
            width: 100%;
            z-index: 1000;
        }

    </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 min-h-screen">
    <div id="app">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 ">
            <div class="flex flex-col items-center space-y-6">
                <!-- Logo animado con reloj simple -->
                <div class="relative">
                    <div id="logo" class="w-20 h-20 rounded-2xl flex items-center justify-center shadow-2xl">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock-icon lucide-clock w-10 h-10 text-white animate-spin"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
                    </div>
                </div>

                <!-- Texto y marca -->
                <div class="text-center space-y-2">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">TimeTracker Pro</h2>
                    <p class="text-gray-600 dark:text-gray-300 animate-pulse">Cargando datos...</p>
                </div>

                <!-- Barra de progreso animada -->
                <div class="w-64 h-1 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full  rounded-full" style="animation: loading-bar 2s ease-in-out infinite;"></div>
                </div>

                <!-- Puntos de carga -->
                <div class="flex space-x-2">
                    <div id="dot-1" class="w-3 h-3 rounded-full animate-bounce" style="animation-delay: 0s; animation-duration: 1s;"></div>
                    <div id="dot-2" class="w-3 h-3 rounded-full animate-bounce" style="animation-delay: 0.2s; animation-duration: 1s;"></div>
                    <div id="dot-3" class="w-3 h-3 rounded-full animate-bounce" style="animation-delay: 0.4s; animation-duration: 1s;"></div>
                </div>
            </div>
        </div>

    </div>

    <div id="blazor-error-ui" class="select-none fixed bottom-4 left-1/2 -translate-x-1/2 max-w-lg w-full bg-red-100 border border-red-400 text-red-800 px-4 py-3 rounded-lg shadow-lg flex items-center justify-between">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-triangle-alert-icon lucide-triangle-alert h-5 w-5 text-red-600 font-bold leading-none">
                    <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/>
                    <path d="M12 9v4"/>
                    <path d="M12 17h.01"/>
                </svg>
                <span class="text-sm font-bold leading-none">
                Algo salió mal.
            </span>
                <span class="text-gray-700 hover:text-gray-800 text-sm font-semibold leading-none">
                Recarga con el botón de la derecha.
            </span>
            </div>
            <a class="reload cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-cw-icon lucide-rotate-cw h-5 w-5 text-gray-700 hover:text-red-800 text-sm font-bold leading-none">
                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                </svg>
            </a>
        </div>
    </div>
    
    <script src="_framework/blazor.webassembly.js"></script>

    <noscript>
        <style>
            body {
                background-color: #0f111a;
                min-height: 100svh;
                display: grid;
                place-content: center;
                color: #f5f5f5;
            }

            .main {
                text-align: center;
                border-radius: 0.7rem;
                padding: 2.5rem;
            }

            .paragraph {
                font-size: clamp(2.7994rem, 1.8553rem + 4.7202vi, 6.1035rem);
                text-align: center;
            }
        </style>
        <main class="main">
            <p class="paragraph">
                Lo siento, necesitas activar JavaScript para ver la página
            </p>
        </main>
    </noscript>
</body>

</html>
