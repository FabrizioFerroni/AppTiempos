<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Tiempos</title>
    <base href="/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/app.min.css" />
    <link rel="stylesheet" href="css/output.css" />
<!--    <link rel="stylesheet" href="css/app_index.css" />-->
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="AppTiemposV3.web.styles.css" rel="stylesheet" />
    <style>
        @keyframes loading-bar {
            0% {
                width: 0%;
                margin-left: 0%;
            }
            50% {
                width: 75%;
                margin-left: 12.5%;
            }
            100% {
                width: 0%;
                margin-left: 100%;
            }
        }
        /*#app-blazor {*/
        /*    display: none;*/
        /*    opacity: 0;*/
        /*    transition: opacity 0.2s ease-in-out;*/
        /*}*/
        
        /*body.blazor-ready #app-blazor {*/
        /*    display: block;*/
        /*    opacity: 1;*/
        /*}*/
        
        
        /*#blazor-error-ui {*/
        /*    width: 100%;*/
        /*    z-index: 1000;*/
        /*}*/
        
        #blazor-error-ui {
            display: none;
            width: 100%;
            z-index: 1000;
        }

    </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 min-h-screen">
    <div id="app">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
            <div class="flex flex-col items-center space-y-6">

                <!-- Logo animado con reloj simple -->
                <div class="relative">
                    <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-500 rounded-2xl flex items-center justify-center shadow-2xl">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock-icon lucide-clock w-10 h-10 text-white animate-spin"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
                    </div>
                </div>

                <!-- Texto y marca -->
                <div class="text-center space-y-2">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">TimeTracker Pro</h2>
                    <p class="text-gray-600 dark:text-gray-300 animate-pulse">Cargando datos...</p>
                </div>

                <!-- Barra de progreso animada -->
                <div class="w-64 h-1 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full" style="animation: loading-bar 2s ease-in-out infinite;"></div>
                </div>

                <!-- Puntos de carga -->
                <div class="flex space-x-2">
                    <div class="w-3 h-3 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full animate-bounce" style="animation-delay: 0s; animation-duration: 1s;"></div>
                    <div class="w-3 h-3 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.2s; animation-duration: 1s;"></div>
                    <div class="w-3 h-3 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.4s; animation-duration: 1s;"></div>
                </div>
            </div>
        </div>

    </div>

    <div id="blazor-error-ui" class="fixed bottom-4 left-1/2 -translate-x-1/2 max-w-lg w-full bg-red-100 border border-red-400 text-red-800 px-4 py-3 rounded-lg shadow-lg flex items-center justify-between">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L4.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <span class="text-sm font-medium">Se ha producido un error.</span>
                <a href="" class="reload text-gray-700 hover:text-gray-800 text-sm font-semibold">Recargar</a>
            </div>
            <a class="dismiss cursor-pointer text-red-700 hover:text-red-500 text-lg leading-none">✕</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
