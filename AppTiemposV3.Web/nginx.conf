server {
    listen 80;
    server_name apptiempos.demosfabriziodev.com 192.168.0.219;

root /usr/share/nginx/html;
    include /etc/nginx/mime.types;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location /api/ {
        proxy_pass http://apptiempos-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    location /auth/ {
        proxy_pass http://apptiempos-api:8080/auth/;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    location ~* \.(?:css|js|json|png|jpg|jpeg|gif|ico|woff2|wasm)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}